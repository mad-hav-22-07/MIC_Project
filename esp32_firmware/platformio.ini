; PlatformIO project configuration — ESP32 Firmware
; ===================================================
; Flash with:   pio run --target upload
; Monitor:      pio device monitor
;
; Required libraries are fetched automatically by PlatformIO.
; For Arduino IDE: install them manually via the Library Manager.

[env:esp32dev]
platform     = espressif32
board        = esp32dev
framework    = arduino
monitor_speed = 115200

lib_deps =
    ; BNO055 IMU — angle, angular velocity, linear acceleration
    adafruit/Adafruit BNO055 @ ^1.6.3
    ; Adafruit Unified Sensor (required by BNO055 driver)
    adafruit/Adafruit Unified Sensor @ ^1.1.9

build_flags =
    -DCORE_DEBUG_LEVEL=1     ; set to 0 for release, 3 for verbose WiFi debug
